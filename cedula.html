<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedula Arbitral | Liga Next Level 7</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    background: #0a0a0a;
    font-family: 'Roboto', Arial, sans-serif;
    margin: 0;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .nav-top {
    width: 100%;
    max-width: 700px;
    margin: 0 auto 14px auto;
  }
  .nav-top a {
    display: inline-block;
    padding: 8px 22px;
    background: rgba(0,0,0,.75);
    border: 1px solid #39ff14;
    border-radius: 12px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;
    transition: .3s;
  }
  .nav-top a:hover {
    background: #39ff14;
    color: black;
    box-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14;
  }

  .editor-panel {
    background: rgba(0,0,0,0.88);
    border: 1px solid #3a6b1a;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 18px;
    width: 100%;
    max-width: 700px;
  }
  .editor-panel h3 {
    color: #b8f030; font-size: 16px; letter-spacing: 2px;
    margin: 0 0 12px; text-transform: uppercase; font-family: 'Bebas Neue', sans-serif;
  }
  .field-label {
    color: #88aa44; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; display:block; margin-bottom:6px;
  }
  .field-input {
    width:100%; padding:10px; background:rgba(255,255,255,0.07); border:1px solid #3a6b1a;
    border-radius:8px; color:#fff; font-size:14px; box-sizing:border-box; outline:none;
  }
  .field-input:focus { border-color:#b8f030; }
  .field-select {
    background: rgba(255,255,255,0.07); border: 1px solid #3a6b1a; border-radius: 6px;
    color: #fff; font-size: 14px; padding: 8px 10px; outline: none; width:100%;
  }
  .field-select option { background: #111; color: #fff; }
  .load-btn {
    background: linear-gradient(135deg, #3a6b1a, #7ddf00); border: none; border-radius: 8px;
    color: #fff; cursor: pointer; font-size: 14px; font-weight: 700;
    letter-spacing: 2px; padding: 10px 16px; text-transform: uppercase; width: 100%;
    touch-action: manipulation;
  }
  .dl-btn {
    background: linear-gradient(135deg, #0277bd, #29b6f6); border: none; border-radius: 8px;
    color: #fff; cursor: pointer; font-size: 14px; font-weight: 700;
    letter-spacing: 2px; padding: 12px 18px; text-transform: uppercase; width: 100%;
    touch-action: manipulation;
  }
  .status-msg { color: #88cc22; font-size: 12px; margin-top: 8px; min-height: 18px; text-align: center; }

  /* ===== STACKING CARDS (lista de partidos, igual que partidos.html) ===== */
  .stack-container {
    width: 100%;
    max-width: 700px;
    position: relative;
    padding-bottom: 40px;
  }
  .stack-section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px; letter-spacing: 3px; text-transform: uppercase;
    color: #39ff14; margin: 18px 0 10px; text-align:left;
  }
  .stack-card {
    position: sticky;
    margin-bottom: 14px;
    cursor: pointer;
    touch-action: manipulation;
  }
  .stack-card-inner {
    background: #000;
    background-image: url('fondotarjetas.png');
    background-size: cover;
    background-position: center;
    border: 4px solid rgba(57,255,20,0.4);
    border-radius: 16px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 0 1px rgba(57,255,20,0.1);
  }
  .stack-card-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 0;
    border-radius: 12px;
  }
  .stack-card-inner > * { position: relative; z-index: 1; }
  .stack-top-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; font-size: 11px; color: rgba(184,240,48,0.7);
    letter-spacing: 1px; font-weight: 700; text-transform: uppercase;
  }
  .stack-teams { display: flex; align-items: center; justify-content: center; gap: 14px; }
  .stack-team { display: flex; align-items: center; gap: 8px; flex:1; min-width:0; }
  .stack-team.visita { flex-direction: row-reverse; text-align: right; }
  .stack-team img { width: 34px; height: 34px; object-fit: contain; flex-shrink:0; }
  .stack-team-name { font-size: 12px; font-weight: 700; color: #fff; text-transform: uppercase; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .stack-score { font-family:'Bebas Neue',sans-serif; font-size: 24px; color: #d4f030; text-shadow: 0 0 10px rgba(120,220,0,0.5); flex-shrink:0; min-width:50px; text-align:center; }
  .stack-score.programado { font-size: 15px; color: rgba(255,255,255,0.4); }
  .stack-bottom-row {
    display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;
    margin-top: 10px; font-size: 10px; color: #ddd;
  }
  .stack-badge {
    font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 12px;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .stack-badge.editable { color:#39ff14; border:1px solid #39ff14; background:rgba(57,255,20,.08); }
  .stack-badge.consulta { color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.25); }
  .borde-programado { border-color: #29a6ff !important; box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 30px rgba(41,166,255,0.6), inset 0 0 20px rgba(41,166,255,0.12) !important; }
  .borde-jugado { border-color: rgba(184,240,48,0.35) !important; }

  /* ===== CEDULA - jugadores ===== */
  .ced-score-box { text-align:center; flex:0 0 auto; }
  .ced-score-num { font-family:'Bebas Neue',sans-serif; font-size:32px; font-weight:900; color:#d4f030; line-height:1.1; }
  .ced-jornada-tag { font-size:10px; color:rgba(57,255,20,0.6); letter-spacing:1px; font-family:'Bebas Neue',sans-serif; }
  .ced-team-col { display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; }
  .ced-team-col img { width:50px; height:50px; object-fit:contain; }
  .ced-team-col span { font-size:11px; font-weight:700; color:#fff; text-transform:uppercase; text-align:center; font-family:'Roboto',Arial,sans-serif; }
  .ced-col-title { font-family:'Bebas Neue',sans-serif; font-size:13px; font-weight:700; color:rgba(57,255,20,0.7); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; text-align:center; }
  .ced-jug-row { display:flex; align-items:center; gap:4px; padding:7px 2px; border-bottom:0.5px solid rgba(255,255,255,0.06); }
  .ced-jug-num { font-size:11px; font-weight:700; color:rgba(57,255,20,0.7); min-width:20px; }
  .ced-jug-name { font-size:11px; color:#fff; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ced-jug-result { font-size:11px; color:#d4f030; font-weight:700; }
  .ced-btn { border-radius:4px; border:2px solid #444; background:#111; color:#666; font-size:11px; font-weight:700; cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }

  .cron-bar { display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:12px; padding:10px; background:rgba(0,0,0,0.4); border-radius:10px; border:1px solid rgba(57,255,20,0.2); }
  .cron-display { font-family:'Bebas Neue',sans-serif; font-size:28px; font-weight:900; color:#39ff14; min-width:65px; text-align:center; }
  .cron-btn { padding:7px 14px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:700; touch-action:manipulation; border:1px solid; }

  .firma-canvas { background:rgba(255,255,255,0.05); border:1px solid #39ff14; border-radius:8px; cursor:crosshair; touch-action:none; width:100%; display:block; margin-top:6px; }
  .firma-clear-btn { margin-top:6px; padding:6px 14px; background:rgba(255,68,68,0.15); border:1px solid #ff4444; border-radius:8px; color:#ff4444; cursor:pointer; font-size:12px; touch-action:manipulation; }

  .empty-msg { text-align: center; color: rgba(255,255,255,0.3); font-size: 14px; padding: 40px; }

  @media (max-width: 600px) {
    .stack-team img { width: 28px; height: 28px; }
    .stack-team-name { font-size: 10px; }
    .stack-score { font-size: 18px; }
    .stack-card-inner { padding: 14px 12px; }
  }
</style>
</head>
<body>

<div class="nav-top">
  <a href="index.html">← Inicio</a>
</div>

<div class="editor-panel">
  <h3>📝 Cédula Arbitral — Next Level 7</h3>
  <div id="modo-arbitro-row" style="display:flex;justify-content:flex-end;margin-bottom:14px;"></div>
  <label class="field-label">Filtrar por Equipo</label>
  <select id="filtro-equipo-cedula" class="field-select" onchange="renderListaPartidos()">
    <option value="">— Todos los equipos —</option>
  </select>
</div>

<!-- LISTA -->
<div id="partidos-section" style="display:block;width:100%;max-width:700px;">
  <div class="stack-container" id="lista-partidos-cedula">
    <div class="empty-msg">Cargando...</div>
  </div>
</div>

<!-- LOGIN -->
<div class="editor-panel" id="login-section" style="display:none;">
  <h3>🔐 Acceso Árbitro</h3>
  <div style="display:flex;flex-direction:column;gap:14px;max-width:320px;margin:0 auto;">
    <div>
      <label class="field-label">Usuario</label>
      <input id="login-user" type="text" placeholder="Usuario" class="field-input">
    </div>
    <div>
      <label class="field-label">Contraseña</label>
      <input id="login-pass" type="password" placeholder="Contraseña" class="field-input">
    </div>
    <button onclick="iniciarSesion()" class="load-btn">ENTRAR</button>
    <div id="login-error" style="color:#ff4444;font-size:13px;text-align:center;min-height:18px;"></div>
  </div>
</div>

<!-- CEDULA -->
<div id="cedula-section" style="display:none;width:100%;max-width:700px;">

  <div class="editor-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:0;">
      <h3 style="margin:0;">Cédula de Partido</h3>
      <button onclick="volverALista()" style="padding:8px 16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;cursor:pointer;font-size:13px;touch-action:manipulation;">← Volver</button>
    </div>
    <div id="cedula-header" style="margin-top:16px;"></div>
  </div>

  <div class="editor-panel">
    <div id="cedula-equipos"></div>
  </div>

  <!-- FIRMA -->
  <div class="editor-panel" id="firma-section" style="display:none;">
    <h3>Resultado Final</h3>
    <div style="margin-bottom:16px;">
      <label class="field-label">Ganado Por</label>
      <select id="ganado-por-sel" class="field-select">
        <option value="Normal">Normal</option>
        <option value="Penales">Penales</option>
        <option value="Default">Default</option>
      </select>
    </div>

    <h3 style="margin-top:8px;">Firmas</h3>
    <div style="margin-top:12px;">
      <label class="field-label">Nombre del Árbitro</label>
      <input id="arbitro-nombre" type="text" placeholder="Nombre del árbitro" class="field-input" style="margin-bottom:8px;">
      <label class="field-label">Firma Árbitro</label>
      <canvas id="firma-arbitro" width="500" height="100" class="firma-canvas"></canvas>
      <button onclick="limpiarFirma('firma-arbitro')" class="firma-clear-btn">Limpiar</button>
    </div>
    <div style="margin-top:16px;">
      <label class="field-label">Nombre Capitán Local</label>
      <input id="capitan-local-nombre" type="text" placeholder="Nombre del capitán local" class="field-input" style="margin-bottom:8px;">
      <label class="field-label">Firma Capitán Local</label>
      <canvas id="firma-capitan-local" width="500" height="100" class="firma-canvas"></canvas>
      <button onclick="limpiarFirma('firma-capitan-local')" class="firma-clear-btn">Limpiar</button>
    </div>
    <div style="margin-top:16px;">
      <label class="field-label">Nombre Capitán Visita</label>
      <input id="capitan-visita-nombre" type="text" placeholder="Nombre del capitán visita" class="field-input" style="margin-bottom:8px;">
      <label class="field-label">Firma Capitán Visita</label>
      <canvas id="firma-capitan-visita" width="500" height="100" class="firma-canvas"></canvas>
      <button onclick="limpiarFirma('firma-capitan-visita')" class="firma-clear-btn">Limpiar</button>
    </div>
  </div>

  <!-- BOTONES -->
  <div class="editor-panel" id="botones-section" style="display:none;">
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <button onclick="guardarCedula()" class="load-btn" style="flex:1;">GUARDAR CÉDULA</button>
      <button onclick="descargarPDF()" class="dl-btn" style="flex:1;">DESCARGAR PDF</button>
    </div>
    <div id="cedula-status" class="status-msg"></div>
    <div id="cedula-data-wrap" style="margin-top:10px;"></div>
  </div>

</div>

<script src="cedula.js"></script>
</body>
</html>
