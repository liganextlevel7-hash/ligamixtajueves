<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Next Level 7</title>
<link rel="stylesheet" href="styles.css">
<style>

/* ===== ANIMACION TITULO (letras dentro del h1 existente) ===== */
#titulo-letras { display:inline; }
.titulo-letra {
  display: inline-block;
  opacity: 0;
}
.titulo-letra.animar {
  animation: letraCae 0.5s cubic-bezier(0.36,0.07,0.19,0.97) forwards;
}
@keyframes letraCae {
  0%   { transform: translateY(-50px) scale(1.3); opacity:0; }
  50%  { transform: translateY(6px) scale(0.96); opacity:1; }
  70%  { transform: translateY(-3px) scale(1.01); }
  100% { transform: translateY(0) scale(1); opacity:1; }
}
.titulo-espacio { display:inline-block; width:0.4em; }

/* Balón */
.balon-container {
  position: absolute;
  pointer-events: none;
  z-index: 10;
  display: none;
}
.balon-emoji {
  font-size: clamp(18px, 4vw, 36px);
  display: block;
  animation: balonSube 0.55s cubic-bezier(0.36,0.07,0.19,0.97) infinite alternate,
             balonGira 0.55s linear infinite;
}
@keyframes balonSube {
  0%   { transform: translateY(-30px) scaleX(1) scaleY(1); }
  85%  { transform: translateY(-2px) scaleX(1.15) scaleY(0.85); }
  100% { transform: translateY(2px) scaleX(1) scaleY(1); }
}
@keyframes balonGira {
  from { filter: hue-rotate(0deg); }
  to   { filter: hue-rotate(360deg); }
}
.balon-sombra {
  width: 20px; height: 5px;
  background: rgba(57,255,20,0.4);
  border-radius: 50%;
  margin: 0 auto;
  animation: sombraBalon 0.55s ease infinite alternate;
}
@keyframes sombraBalon {
  0%   { transform: scaleX(0.3); opacity: 0.1; }
  100% { transform: scaleX(1);   opacity: 0.5; }
}

/* ===== CARRUSEL ===== */
.carrusel-seccion {
  max-width: 1100px;
  margin: 20px auto 30px;
  padding: 0 10px;
  position: relative;
  height: 420px;
}
.card-sec {
  position: absolute;
  top: 50%; left: 50%;
  width: 280px;
  border-radius: 22px;
  cursor: pointer;
  transition: all 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
  transform: translate(-50%,-50%) scale(0.4);
  opacity: 0;
  pointer-events: none;
  overflow: hidden;
  border: 1px solid #39ff14;
  box-shadow: 0 0 10px #39ff14, 0 0 20px rgba(57,255,20,0.3);
}
.card-sec.c  { transform:translate(-50%,-50%) scale(1);                                   opacity:1; z-index:5; pointer-events:all; }
.card-sec.l1 { transform:translate(calc(-50% - 240px),-50%) scale(0.75) rotateY(15deg);  opacity:0.75; z-index:4; pointer-events:all; }
.card-sec.r1 { transform:translate(calc(-50% + 240px),-50%) scale(0.75) rotateY(-15deg); opacity:0.75; z-index:4; pointer-events:all; }
.card-sec.l2 { transform:translate(calc(-50% - 400px),-50%) scale(0.55) rotateY(22deg);  opacity:0.3; z-index:3; pointer-events:all; }
.card-sec.r2 { transform:translate(calc(-50% + 400px),-50%) scale(0.55) rotateY(-22deg); opacity:0.3; z-index:3; pointer-events:all; }

.card-body { padding:22px 18px 18px; display:flex; flex-direction:column; gap:10px; min-height:380px; }
.card-titulo { font-size:15px; font-weight:900; letter-spacing:2px; text-transform:uppercase; text-align:center; }
.card-contenido { flex:1; font-size:12px; font-family:Arial,sans-serif; }
.car-btn { display:block; text-align:center; padding:10px; border-radius:20px; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; text-decoration:none; cursor:pointer; border:none; width:100%; transition:filter 0.3s; touch-action:manipulation; }
.car-btn:hover { filter:brightness(1.3); }

.c-tabla    .card-body { background:linear-gradient(rgba(10,30,10,0.55),rgba(15,30,15,0.65)), url('fondo-partidos.png'); background-size:cover; background-position:center; }
.c-tabla    .card-titulo { color:#39ff14; }
.c-tabla    .car-btn { background:rgba(57,255,20,0.15); color:#39ff14; border:1px solid #39ff14; }
.c-goles    .card-body { background:linear-gradient(rgba(30,20,0,0.55),rgba(35,25,0,0.65)), url('fondo-partidos.png'); background-size:cover; background-position:center; }
.c-goles    .card-titulo { color:#ffb400; }
.c-goles    .car-btn { background:rgba(255,180,0,0.15); color:#ffb400; border:1px solid #ffb400; }
.c-partidos .card-body { background:linear-gradient(rgba(8,20,30,0.55),rgba(10,25,40,0.65)), url('fondo-partidos.png'); background-size:cover; background-position:center; }
.c-partidos .card-titulo { color:#1da1f2; }
.c-partidos .car-btn { background:rgba(29,161,242,0.15); color:#1da1f2; border:1px solid #1da1f2; }
.c-proxima  .card-body { background:linear-gradient(rgba(30,10,20,0.55),rgba(35,15,25,0.65)), url('fondo-partidos.png'); background-size:cover; background-position:center; }
.c-proxima  .card-titulo { color:#ff5096; }
.c-proxima  .car-btn { background:rgba(255,80,150,0.15); color:#ff5096; border:1px solid #ff5096; }
.c-equipos  .card-body { background:linear-gradient(rgba(10,20,30,0.88),rgba(10,25,40,0.92)), url('fondo-partidos.png'); background-size:cover; background-position:center; }
.c-equipos  .card-titulo { color:#64c8ff; }
.c-equipos  .car-btn { background:rgba(100,200,255,0.15); color:#64c8ff; border:1px solid #64c8ff; }
.c-liguilla .card-body { background:#000; padding:0 !important; }
.c-liguilla .card-titulo { color:#b464ff; position:absolute; top:14px; left:0; right:0; z-index:2; text-shadow:0 2px 6px rgba(0,0,0,0.8); }
.c-liguilla .car-btn { background:rgba(180,100,255,0.85); color:#fff; border:1px solid #b464ff; position:absolute; bottom:14px; left:18px; right:18px; z-index:2; width:auto; }
.c-liguilla .liguilla-img { width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; }
.c-cedula   .card-body { background:#000; padding:0 !important; }

.c-cedula   .car-btn { background:rgba(180,255,50,0.85); color:#000; border:1px solid #b4ff32; position:absolute; bottom:14px; left:18px; right:18px; z-index:2; width:auto; }
.c-cedula   .cedula-img { width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; }

.mini-fila { display:flex; align-items:center; gap:8px; padding:7px 4px; border-bottom:1px solid rgba(255,255,255,0.07); font-size:12px; color:rgba(255,255,255,0.85); }
.mini-fila img { width:28px; height:28px; object-fit:contain; }
.mini-rank { font-weight:900; color:#ffd700; min-width:20px; text-align:center; }
.mini-pts  { font-weight:900; color:#39ff14; margin-left:auto; }
.mini-marcador { font-weight:900; color:#ffd700; margin-left:auto; font-size:13px; }
.mini-vs   { font-weight:900; color:#ffd700; margin-left:auto; }
.car-cargando { color:rgba(255,255,255,0.3); text-align:center; padding:20px; font-size:12px; }

.car-flecha { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.2); border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; color:#fff; z-index:10; transition:all 0.3s; touch-action:manipulation; user-select:none; }
.car-flecha:hover { background:rgba(255,255,255,0.2); }
.car-fl { left:5px; } .car-fr { right:5px; }
.car-dots { position:absolute; bottom:0; left:50%; transform:translateX(-50%); display:flex; gap:8px; }
.car-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.2); cursor:pointer; transition:all 0.3s; }
.car-dot.on { background:#39ff14; transform:scale(1.3); }

/* FIFA MINI */
.fifa-mini { width:75px; height:120px; border-radius:10px 10px 6px 6px; position:relative; display:flex; flex-direction:column; align-items:center; overflow:hidden; }
.fifa-mini.gold   { background:linear-gradient(160deg,#ffe566,#f5a500,#b8720a,#f5d020); border:1.5px solid #ffd700; box-shadow:0 0 10px #ffd700; }
.fifa-mini.silver { background:linear-gradient(160deg,#f0f0f0,#c0c0c0,#808080,#d8d8d8); border:1.5px solid #c0c0c0; box-shadow:0 0 8px #bbb; }
.fifa-mini.blue   { background:linear-gradient(160deg,#64d0ff,#0288d1,#01579b,#29b6f6); border:1.5px solid #29b6f6; box-shadow:0 0 8px #29b6f6; }
.fifa-mini .mn-shimmer { position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(255,255,255,0.2) 0%,transparent 50%);pointer-events:none;border-radius:inherit; }
.fifa-mini .mn-svg  { width:70px; height:80px; z-index:1; }
.fifa-mini .mn-nombre { font-size:6.5px; font-weight:900; text-align:center; padding:1px 4px; line-height:1.2; z-index:1; text-transform:uppercase; max-width:70px; word-break:break-word; }

<script>
// ===== ANIMACION TITULO =====
const palabras = ['LIGA', 'NEXT', 'LEVEL', '7'];
const letrasEl = document.getElementById('titulo-letras');
let letraIEl = null;
let totalLetras = 0;

palabras.forEach((palabra, pi) => {
  if (pi > 0) {
    const esp = document.createElement('span');
    esp.className = 'titulo-espacio';
    letrasEl.appendChild(esp);
  }
  palabra.split('').forEach((ch, ci) => {
    const span = document.createElement('span');
    span.className = 'titulo-letra';
    span.textContent = ch;
    span.dataset.idx = totalLetras;
    // La primera I de LIGA (palabra 0, indice 1)
    if (pi === 0 && ch === 'I' && !letraIEl) letraIEl = span;
    letrasEl.appendChild(span);
    totalLetras++;
  });
});

let delay = 300;
const todasLetras = document.querySelectorAll('.titulo-letra');
todasLetras.forEach((letra, i) => {
  setTimeout(() => {
    letra.classList.add('animar');
    if (letra === letraIEl) {
      setTimeout(() => posicionarBalon(), 200);
    }
  }, delay);
  delay += 80;
});

function posicionarBalon() {
  if (!letraIEl) return;
  const wrap = letraIEl.closest('h1');
  const balonWrap = document.getElementById('balon-wrap');
  const rectI = letraIEl.getBoundingClientRect();
  const rectWrap = wrap.getBoundingClientRect();
  const balonSize = parseInt(getComputedStyle(document.querySelector('.balon-emoji')).fontSize);
  balonWrap.style.left = (rectI.left - rectWrap.left + rectI.width/2 - balonSize/2) + 'px';
  balonWrap.style.top  = (-balonSize - 6) + 'px';
  balonWrap.style.display = 'block';
}

window.addEventListener('resize', () => { if (letraIEl) posicionarBalon(); });

// ===== CARRUSEL DATOS =====
const CAR_ESTADISTICAS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRs55yHIAY-lWfU6XccheWIPHUjF4aRue0jy68FbZ9fNtPJfeO1glwsWI46cWv-6cxXy2slGty-DgMd/pub?gid=979195152&single=true&output=csv";
const CAR_PARTIDOS     = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRs55yHIAY-lWfU6XccheWIPHUjF4aRue0jy68FbZ9fNtPJfeO1glwsWI46cWv-6cxXy2slGty-DgMd/pub?gid=1362473459&single=true&output=csv";

function carParseCSV(text) {
  const lines = text.replace(/\r/g,'').trim().split('\n');
  const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=[]; let cur='',inQ=false;
    for(let ch of line){ if(ch==='"') inQ=!inQ; else if(ch===','&&!inQ){vals.push(cur.trim());cur='';} else cur+=ch; }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/^"|"$/g,'').trim());
    return obj;
  });
}

    <text x="224" y="310" text-anchor="middle" font-family="Arial" font-weight="900" font-size="90" fill="${c.text}" opacity="0.85">${num}</text>
    ${li}
  </svg>`;
}

async function cargarCarrusel() {
  try {
    const [resE,resP,resJ,resEv,resPart] = await Promise.all([
      fetch(CAR_ESTADISTICAS),fetch(CAR_PARTIDOS),fetch(CAR_JUGADORES),fetch(CAR_EVENTOS),fetch(CAR_PARTIC)
    ]);
    const [tE,tP,tJ,tEv,tPart] = await Promise.all([resE.text(),resP.text(),resJ.text(),resEv.text(),resPart.text()]);

    // TABLA
    const filasE=tE.trim().split('\n'); const equipos=[];
    for(let i=1;i<filasE.length;i++){
      const c=filasE[i].split(','); const n=(c[1]||'').trim();
      if(n==='Descansa'||!n) continue;
      equipos.push({ranking:Number(c[10])||999,nombre:n,pts:Number(c[9])||0});
    }
    equipos.sort((a,b)=>a.ranking-b.ranking);
    let htmlTabla='';
    equipos.slice(0,5).forEach((e,i)=>{
      const m=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'°';
      htmlTabla+=`<div class="mini-fila"><span class="mini-rank">${m}</span><img src="${carLogos[e.nombre]||''}" onerror="this.style.display='none'"><span style="flex:1;font-size:11px;">${e.nombre}</span><span class="mini-pts">${e.pts}pts</span></div>`;
    });
    document.getElementById('car-tabla').innerHTML=htmlTabla||'<div class="car-cargando">Sin datos</div>';

    // PARTIDOS
    const filasP=tP.trim().split('\n'); const jugados=[],programados=[];
    for(let i=1;i<filasP.length;i++){
      const c=filasP[i].split(','); const estado=(c[6]||'').trim();
      const local=carEqID[Number(c[2])]||'', visita=carEqID[Number(c[3])]||'';
      const p={local,visita,gl:c[4]||'',gv:c[5]||'',fecha:(c[8]||'').trim()};
      if(estado==='Jugado') jugados.push(p);
      if(estado==='Programado') programados.push(p);
    }

    // Resultados
    let htmlRes='';
    if(jugados.length){
      const fu=jugados[jugados.length-1].fecha;
      if(fu) htmlRes=`<div style="font-size:10px;color:#ffd700;text-align:center;margin-bottom:6px;">${fu}</div>`;
      jugados.filter(p=>p.fecha===fu).slice(0,4).forEach(p=>{
        htmlRes+=`<div class="mini-fila"><img src="${carLogos[p.local]||''}" onerror="this.style.display='none'"><span style="flex:1;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.local}</span><span class="mini-marcador">${p.gl}-${p.gv}</span><span style="flex:1;font-size:10px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.visita}</span><img src="${carLogos[p.visita]||''}" onerror="this.style.display='none'"></div>`;
      });
    }
    document.getElementById('car-resultados').innerHTML=htmlRes||'<div class="car-cargando">Sin resultados</div>';

    // Próxima
    let htmlProx='';
    if(programados.length){
      const fp=programados[0].fecha;
      if(fp) htmlProx=`<div style="font-size:10px;color:#ff5096;text-align:center;margin-bottom:6px;">${fp}</div>`;
      programados.filter(p=>p.fecha===fp).slice(0,4).forEach(p=>{
        htmlProx+=`<div class="mini-fila"><img src="${carLogos[p.local]||''}" onerror="this.style.display='none'"><span style="flex:1;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.local}</span><span class="mini-vs">VS</span><span style="flex:1;font-size:10px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.visita}</span><img src="${carLogos[p.visita]||''}" onerror="this.style.display='none'"></div>`;
      });
    }
    document.getElementById('car-proxima').innerHTML=htmlProx||'<div class="car-cargando">Sin partidos programados</div>';

    // GOLEADORES FIFA
    const jugadores=carParseCSV(tJ), eventos=carParseCSV(tEv), partic=carParseCSV(tPart);
    const golMap={}, partMap={};
    eventos.filter(e=>e.Tipo_Evento==='Gol').forEach(e=>{golMap[e.Jugador]=(golMap[e.Jugador]||0)+1;});
    partic.filter(p=>p.Asistio==='TRUE').forEach(p=>{partMap[p.Jugador]=(partMap[p.Jugador]||0)+1;});
    const top3=jugadores.filter(j=>golMap[j.ID_Jugador]>0)
      .map(j=>({nombre:j.Nombre||'',equipoID:Number(j.Equipo),numero:j.Numero||'-',goles:golMap[j.ID_Jugador]||0,partidos:partMap[j.ID_Jugador]||0}))
      .sort((a,b)=>b.goles-a.goles).slice(0,3);
    const tg=['gold','silver','blue'], med=['🥇','🥈','🥉'];
    let htmlGoles='';
    if(top3.length){
      top3.forEach((j,i)=>{
        htmlGoles+=`<div class="fifa-mini-wrap"><div class="fifa-mini-medal">${med[i]}</div><div class="fifa-mini ${tg[i]}"><div class="mn-shimmer"></div><div class="mn-svg">${svgMini(tg[i],j.numero,carLogosID[j.equipoID]||'')}</div><div class="mn-nombre">${j.nombre}</div><div class="mn-sep"></div><div class="mn-stats"><div class="mn-stat"><div class="mn-val">${j.goles}</div><div class="mn-lbl">GOLES</div></div><div class="mn-stat"><div class="mn-val">${j.partidos}</div><div class="mn-lbl">PART</div></div></div></div></div>`;
      });
    } else { htmlGoles='<div class="car-cargando">Sin goles aún</div>'; }
    document.getElementById('car-goles').innerHTML=htmlGoles;

  } catch(e){ console.error(e); }
}

// ===== CARRUSEL LOGIC =====
const carCards=document.querySelectorAll('.card-sec'), carTotal=carCards.length;
let carActivo=0;

function carActualizar(){
  carCards.forEach((card,i)=>{
    card.className=card.className.replace(/\b(c|l1|l2|r1|r2)\b/g,'').trim();
    const diff=((i-carActivo)%carTotal+carTotal)%carTotal;
    let cls='';
    if(diff===0) cls='c';
    else if(diff===1) cls='r1';
    else if(diff===2) cls='r2';
    else if(diff===carTotal-1) cls='l1';
    else if(diff===carTotal-2) cls='l2';
    if(cls) card.classList.add(cls);
  });
  document.querySelectorAll('.car-dot').forEach((d,i)=>d.classList.toggle('on',i===carActivo));
}

function carMover(dir){ carActivo=((carActivo+dir)%carTotal+carTotal)%carTotal; carActualizar(); }

const carDotsEl=document.getElementById('car-dots');
carCards.forEach((_,i)=>{
  const d=document.createElement('div'); d.className='car-dot'+(i===0?' on':'');
  d.onclick=()=>{carActivo=i;carActualizar();}; carDotsEl.appendChild(d);
});

carCards.forEach((card,i)=>{
  card.addEventListener('click',e=>{
    if(!card.classList.contains('c')){ e.preventDefault(); e.stopPropagation(); carActivo=i; carActualizar(); }
  });
});

let carTx=0;
document.getElementById('carrusel-wrap').addEventListener('touchstart',e=>{carTx=e.touches[0].clientX;});
document.getElementById('carrusel-wrap').addEventListener('touchend',e=>{
  const d=carTx-e.changedTouches[0].clientX; if(Math.abs(d)>50) carMover(d>0?1:-1);
});

setInterval(()=>carMover(1),5000);
carActualizar();
cargarCarrusel();
</script>
