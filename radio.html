<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Level 7 - Radio en Vivo</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: url('fondoradio.png') center/cover no-repeat fixed;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
  }

  a.volver {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #111;
    background: linear-gradient(145deg, #b6ff2e, #f2c200);
    text-decoration: none;
    font-weight: bold;
    font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 20px;
    box-shadow: 0 0 10px rgba(126, 211, 33, 0.5);
    z-index: 10;
  }
  a.volver:hover { transform: scale(1.05); }

  /* ===== BLOQUE ÚNICO: logo + reproductor + badge ===== */
  /* Para agrandar o achicar TODO junto, cambia solo --scale en el div de abajo. */
  .radio-widget {
    width: 540px;
    max-width: 95vw;
    transform: scale(var(--scale, 1));
    transform-origin: center center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .radio-widget .logo {
    width: 100%;
    filter: drop-shadow(0 0 15px rgba(0,0,0,0.7));
    position: relative;
    z-index: 2;
  }

  .radio-widget .player-card {
    background: rgba(10, 10, 10, 0.92);
    border: 2px solid #b6ff2e;
    border-radius: 24px;
    padding: 6px;
    box-shadow: 0 0 20px rgba(126, 211, 33, 0.5);
    margin-top: -60px;
    position: relative;
    z-index: 1;
    overflow: hidden;
    display: flex;
    justify-content: center;
  }

  .play-btn {
    background: linear-gradient(145deg, #b6ff2e, #f2c200);
    border: none;
    width: 30px;
    height: 30px;
    min-width: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(126, 211, 33, 0.7);
  }
  .play-btn svg { width: 13px; height: 13px; fill: #111; }

  .time {
    color: #f2c200;
    font-size: 0.8rem;
    font-weight: bold;
    min-width: 30px;
    text-align: left;
  }

  .progress-wrap {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    width: 30%;
    background: linear-gradient(90deg, #7ed321, #f2c200, #ff8c00);
    border-radius: 10px;
    animation: flow 2.5s linear infinite;
    background-size: 200% 100%;
  }
  @keyframes flow {
    0% { background-position: 0% 0; }
    100% { background-position: 200% 0; }
  }

  .vol-btn svg { width: 16px; height: 16px; fill: #f2c200; }

  .live-badge {
    background: #b00020;
    color: #fff;
    font-weight: bold;
    font-size: 0.7rem;
    padding: 4px 12px;
    border-radius: 20px;
    margin-top: 14px;
    letter-spacing: 1px;
    box-shadow: 0 0 12px rgba(176,0,32,0.6);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(176,0,32,0.6); }
    70% { box-shadow: 0 0 0 12px rgba(176,0,32,0); }
    100% { box-shadow: 0 0 0 0 rgba(176,0,32,0); }
  }
</style>
</head>
<body>

  <a href="index.html" class="volver">← Volver al inicio</a>

  <div class="radio-widget" style="--scale:1;">
    <img src="radio.png" alt="Next Level 7 Radio" class="logo">

    <div class="player-card">
      <iframe
        src="https://listen.zeno.fm/player/next-level-7"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        frameborder="0"
        scrolling="no"
        height="300"
        width="500"
        loading="lazy"
        style="border-radius:20px; display:block; max-width:100%;">
      </iframe>
    </div>

    <div class="live-badge">● EN VIVO</div>
  </div>

</body>
</html>
