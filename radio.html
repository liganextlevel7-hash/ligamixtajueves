<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Level 7 - Radio en Vivo</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at center, #0a2233 0%, #050f17 60%, #030608 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
  }

  a.volver {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #111;
    background: linear-gradient(145deg, #00b4ff, #ff6b1a);
    text-decoration: none;
    font-weight: bold;
    font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 20px;
    box-shadow: 0 0 10px rgba(0, 180, 255, 0.5);
    z-index: 10;
  }
  a.volver:hover { transform: scale(1.05); }

  /* ===== BLOQUE ÚNICO: logo + reproductor + badge ===== */
  /* Para agrandar o achicar TODO junto, cambia solo --scale en el div de abajo. */
  .radio-widget {
    width: 400px;
    max-width: 95vw;
    transform: scale(var(--scale, 1));
    transform-origin: center center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .radio-widget .logo {
    width: 100%;
    filter: drop-shadow(0 0 15px rgba(0,0,0,0.7));
    position: relative;
    z-index: 2;
  }

  .radio-widget .player-card {
    background: rgba(10, 10, 10, 0.92);
    border: 2px solid #00b4ff;
    border-radius: 24px;
    padding: 6px;
    box-shadow: 0 0 20px rgba(0, 180, 255, 0.5);
    margin-top: -60px;
    position: relative;
    z-index: 1;
    overflow: hidden;
    display: flex;
    justify-content: center;
  }

  .play-btn {
    background: linear-gradient(145deg, #00b4ff, #ff6b1a);
    border: none;
    width: 30px;
    height: 30px;
    min-width: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0, 180, 255, 0.7);
  }
  .play-btn svg { width: 13px; height: 13px; fill: #111; }

  .time {
    color: #ff6b1a;
    font-size: 0.8rem;
    font-weight: bold;
    min-width: 30px;
    text-align: left;
  }

  .progress-wrap {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    width: 30%;
    background: linear-gradient(90deg, #00b4ff, #4dd2ff, #ff6b1a);
    border-radius: 10px;
    animation: flow 2.5s linear infinite;
    background-size: 200% 100%;
  }
  @keyframes flow {
    0% { background-position: 0% 0; }
    100% { background-position: 200% 0; }
  }

  .vol-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
  }
  .vol-btn svg { width: 16px; height: 16px; fill: #ff6b1a; }

  .live-badge {
    background: #b00020;
    color: #fff;
    font-weight: bold;
    font-size: 0.7rem;
    padding: 4px 12px;
    border-radius: 20px;
    margin-top: 14px;
    letter-spacing: 1px;
    box-shadow: 0 0 12px rgba(176,0,32,0.6);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(176,0,32,0.6); }
    70% { box-shadow: 0 0 0 12px rgba(176,0,32,0); }
    100% { box-shadow: 0 0 0 0 rgba(176,0,32,0); }
  }
</style>
</head>
<body>

  <a href="index.html" class="volver">← Volver al inicio</a>

  <div class="radio-widget" style="--scale:1;">
    <img src="radio.png" alt="Next Level 7 Radio" class="logo">

    <div class="player-card">
      <iframe
        src="https://listen.zeno.fm/player/next-level-7"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        frameborder="0"
        scrolling="no"
        height="250"
        width="300"
        loading="lazy"
        style="border-radius:20px; display:block; max-width:100%;">
      </iframe>
    </div>

    <div class="live-badge">● EN VIVO</div>
  </div>

  <!-- Cortina/jingle "Next Level 7 Radio": suena encima de la radio cada 10 min, solo en esta página -->
  <audio id="jingle-nl7" src="jingle-nl7.mp3" preload="auto"></audio>

  <script>
    // ===== Cortina/jingle "Next Level 7 Radio" =====
    const JINGLE_CADA_MS = 1 * 60 * 1000; // PRUEBA: cada 1 minuto — regresar a 10 * 60 * 1000 cuando termines de probar
    const JINGLE_VOLUMEN = 1;
    const jingleAudio = document.getElementById('jingle-nl7');
    jingleAudio.volume = JINGLE_VOLUMEN;
    let jingleDesbloqueado = false;

    function desbloquearJingle(){
      if(jingleDesbloqueado) return;
      jingleDesbloqueado = true;
      // Truco estándar: reproducir y pausar de inmediato tras el primer clic,
      // para que el navegador permita reproducir audio automático más adelante.
      jingleAudio.play().then(()=>{ jingleAudio.pause(); jingleAudio.currentTime = 0; }).catch(()=>{});
    }
    document.addEventListener('click', desbloquearJingle, {once:true});
    document.addEventListener('touchstart', desbloquearJingle, {once:true});

    // Intento de autoplay al cargar la página, sin esperar clic.
    // Los navegadores pueden bloquear esto si el usuario no ha interactuado antes con el sitio;
    // si falla, el jingle seguirá funcionando en cuanto la persona haga clic o toque la pantalla.
    window.addEventListener('load', ()=>{
      jingleAudio.play().then(()=>{
        jingleDesbloqueado = true;
      }).catch(e=>console.log('Autoplay bloqueado por el navegador, se activará con el primer clic:', e));
    });

    setInterval(()=>{
      if(!jingleDesbloqueado) return;
      jingleAudio.currentTime = 0;
      jingleAudio.play().catch(e=>console.log('El jingle no pudo sonar automáticamente:', e));
    }, JINGLE_CADA_MS);
  </script>

</body>
</html>
